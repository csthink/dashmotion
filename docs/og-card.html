<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>dashmotion — social card</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; overflow: hidden; }
  body {
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    background:
      radial-gradient(900px 520px at 78% 42%, rgba(34,211,238,0.08), transparent 70%),
      #020617;
    color: #e2e8f0;
    display: flex; align-items: center; gap: 40px;
    padding: 70px 72px;
  }
  .left { width: 520px; flex: 0 0 520px; }
  .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
  .brand .dot {
    width: 14px; height: 14px; border-radius: 50%; background: #22d3ee;
    box-shadow: 0 0 16px 3px rgba(34,211,238,0.7);
  }
  .brand span { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.01em; }
  h1 { font-size: 3.6rem; font-weight: 700; line-height: 1.02; letter-spacing: -0.03em; margin-bottom: 22px; }
  .sub { font-size: 1.12rem; line-height: 1.55; color: #94a3b8; margin-bottom: 30px; }
  .sub b { color: #e2e8f0; font-weight: 500; }
  .install {
    display: inline-block; background: #060d20; border: 1px solid #1e293b;
    border-radius: 9px; padding: 12px 16px; font-size: 1rem; color: #e2e8f0; margin-bottom: 18px;
  }
  .install .p { color: #475569; }
  .tags { font-size: 0.95rem; color: #64748b; }
  .right { flex: 1; display: flex; align-items: center; justify-content: center; }
  svg { width: 100%; height: auto; }
  .node-label { fill: #e2e8f0; font-size: 16px; font-weight: 500; }
  .node-sub { fill: #64748b; font-size: 11px; }
</style>
</head>
<body>
  <div class="left">
    <div class="brand"><span class="dot"></span><span>dashmotion</span></div>
    <h1>Diagrams<br>that move.</h1>
    <p class="sub">A Claude skill that turns a description — or a Mermaid diagram — into a single <b>self-contained HTML file</b> where the connectors flow and requests travel as moving dots.</p>
    <div class="install"><span class="p">$ </span>npx skills add csthink/dashmotion</div>
    <div class="tags">pure SVG/CSS · no animation library · a few KB · MIT</div>
  </div>

  <div class="right">
    <svg viewBox="0 0 560 470" role="img" aria-label="An architecture diagram with a request travelling through it">
      <defs>
        <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
          <stop offset="1" stop-color="#22d3ee" stop-opacity="0.95"/>
        </linearGradient>
        <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0 0 L10 5 L0 10 z" fill="#475569"/>
        </marker>
      </defs>

      <!-- region boundary -->
      <rect x="10" y="10" width="540" height="450" rx="14" fill="none" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8 5" opacity="0.45"/>
      <text x="30" y="36" fill="#fbbf24" font-size="11" opacity="0.85">region · vpc</text>

      <!-- connectors -->
      <path d="M150 150 H210" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
      <path d="M340 150 H400" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
      <path d="M275 184 V300 H210" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
      <path d="M150 334 H115 V184" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

      <!-- request in flight: comet trail + glowing dot on gateway->service -->
      <path d="M344 150 H392" fill="none" stroke="url(#trail)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="392" cy="150" r="6" fill="#22d3ee" filter="url(#glow)"/>

      <!-- nodes -->
      <g font-family="JetBrains Mono, monospace" text-anchor="middle">
        <rect x="30" y="120" width="120" height="60" rx="9" fill="#0b1226"/>
        <rect x="30" y="120" width="120" height="60" rx="9" fill="rgba(8,51,68,0.45)" stroke="#22d3ee" stroke-width="1.5"/>
        <text class="node-label" x="90" y="146">Client</text>
        <text class="node-sub" x="90" y="164">browser</text>

        <rect x="215" y="120" width="125" height="60" rx="9" fill="#0b1226"/>
        <rect x="215" y="120" width="125" height="60" rx="9" fill="rgba(120,53,15,0.35)" stroke="#fbbf24" stroke-width="1.5"/>
        <text class="node-label" x="277" y="146">Gateway</text>
        <text class="node-sub" x="277" y="164">api · auth</text>

        <rect x="405" y="120" width="125" height="60" rx="9" fill="#0b1226"/>
        <rect x="405" y="120" width="125" height="60" rx="9" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text class="node-label" x="467" y="146">Service</text>
        <text class="node-sub" x="467" y="164">orders</text>

        <rect x="90" y="304" width="120" height="60" rx="9" fill="#0b1226"/>
        <rect x="90" y="304" width="120" height="60" rx="9" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
        <text class="node-label" x="150" y="330">Database</text>
        <text class="node-sub" x="150" y="348">postgres</text>
      </g>
    </svg>
  </div>
</body>
</html>
